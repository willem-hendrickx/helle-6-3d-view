<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elektriciteitsplan herstellen</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f2;
        color: #18201b;
        font-family: Inter, Arial, sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 40px));
        background: #ffffff;
        border: 1px solid #d7ddd5;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(24, 32, 27, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        line-height: 1.5;
        margin: 0 0 14px;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 6px;
        border: 1px solid #155844;
        background: #1f6f58;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      a {
        background: #ffffff;
        color: #155844;
        margin-left: 8px;
      }

      #status {
        margin-top: 18px;
        min-height: 24px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Elektriciteitsplan herstellen</h1>
      <p>
        Er is een gedeeltelijke backup gevonden in de lokale browseropslag: 3 items op Gelijkvloers.
        Deze knop zet die backup terug onder dezelfde opslagkey van de planner.
      </p>
      <p>
        De huidige lege toestand wordt eerst apart bewaard als extra veiligheid.
      </p>
      <button id="restoreButton" type="button">Backup herstellen</button>
      <a href="/electriciteit.html">Naar planner</a>
      <div id="status"></div>
    </main>

        localStorage.setItem(STORAGE_KEY, JSON.stringify(RECOVERED_PROJECT));
        document.querySelector("#status").textContent = "Backup hersteld. Open nu de planner.";
      });
    </script>

</html>
